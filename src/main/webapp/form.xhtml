<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:faces="jakarta.faces"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                template="/WEB-INF/layout/template.xhtml">

    <ui:define name="metadata">
        <f:metadata>
            <f:viewParam name="id" value="#{editTaskAction.taskId}">
            </f:viewParam>
            <f:viewAction action="#{editTaskAction.init()}"/>
        </f:metadata>
    </ui:define>

    <ui:define name="pageTitle">
        <span faces:rendered="#{empty editTaskAction.task.id}">Create Task</span>
        <span faces:rendered="#{not empty editTaskAction.task.id}">Edit Task</span>
    </ui:define>

    <ui:define name="content">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-sm-12">
                <div class="form-card">
                    
                    <!-- Metadata for existing task -->
                    <div faces:rendered="#{not empty editTaskAction.task.id}" class="d-flex align-items-center gap-2 mb-4 pb-3 border-bottom">
                        <span class="badge bg-secondary py-2 px-3 fs-6 rounded-pill">ID: #{editTaskAction.task.id}</span>
                        <span class="status-badge #{editTaskAction.task.status.toString().toLowerCase()}">
                            <i class="bi #{editTaskAction.task.status.toString() == 'TODO' ? 'bi-list-task' : (editTaskAction.task.status.toString() == 'DOING' ? 'bi-hourglass-split' : 'bi-check2-square')}"></i>
                            #{editTaskAction.task.status}
                        </span>
                    </div>

                    <form faces:id="form" class="form">
                        <div class="form-group">
                            <label class="text-uppercase" faces:for="name">Task Name</label>
                            <input type="text"
                                   faces:id="name"
                                   class="form-control #{not empty facesContext.getMessageList('form:name')?'is-invalid':''}"
                                   faces:value="#{editTaskAction.task.name}"
                                   faces:required="true"
                                   faces:requiredMessage="Task name is required."
                                   placeholder="What needs to be done?">
                            </input>
                            <span class="invalid-feedback">
                                <h:message for="name" showDetail="false" showSummary="true"/>
                            </span>
                        </div>

                        <div class="form-group">
                            <label class="text-uppercase" faces:for="description">Task Description</label>
                            <textarea faces:id="description"
                                      class="form-control #{not empty facesContext.getMessageList('form:description')?'is-invalid':''}"
                                      rows="6"
                                      faces:value="#{editTaskAction.task.description}"
                                      faces:required="true"
                                      faces:requiredMessage="Description is required."
                                      placeholder="Add some details about this task..."/>
                            <span class="invalid-feedback">
                                <h:message for="description" showDetail="false" showSummary="true"/>
                            </span>
                        </div>

                        <div class="d-flex align-items-center gap-3 mt-4 pt-3 border-top">
                            <button faces:id="submitTask" type="submit"
                                    faces:action="#{editTaskAction.save()}" 
                                    class="btn btn-primary btn-lg">
                                <i class="bi bi-save"></i>Save Task
                            </button>
                            <a faces:outcome="/tasks.xhtml" class="btn btn-outline-secondary btn-lg">
                                <i class="bi bi-x-lg"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
