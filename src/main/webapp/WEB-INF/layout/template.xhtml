<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:faces="jakarta.faces"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view contentType="text/html" encoding="UTF-8">
    <ui:insert name="metadata"></ui:insert>
    <head faces:id="head">
        <title>Taskboard - A Jakarta EE Faces Example</title>
        <!-- Required meta tags -->
        <meta charset="utf-8"></meta>
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"></meta>
        <!-- styles -->
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
        <link href="#{resource['css/main.css']}" rel="stylesheet"/>
        <ui:insert name="headIncludes"></ui:insert>
    </head>

    <body faces:id="body" class="d-flex flex-column h-100">
        <header class="header">
            <ui:include src="/WEB-INF/layout/header.xhtml"/>
        </header>

        <main class="flex-shrink-0">
            <div class="container">
                <ui:include src="/WEB-INF/layout/alert.xhtml"/>

                <h1 class="page-header display-5">
                    <ui:insert name="pageTitle"></ui:insert>
                </h1>

                <ui:insert name="content"/>
            </div>
        </main>

        <ui:include src="/WEB-INF/layout/footer.xhtml"/>
        
        <!-- Bootstrap 5 JavaScript Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        
        <ui:insert name="bodyIncludes"></ui:insert>
    </body>
</f:view>
</html>
